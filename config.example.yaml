# Certificate paths are relative to --path (the working directory).

# Instance name: the NATS connection name and the per-instance durable JetStream
# consumer (each instance consumes every event to build its own copy). Expanded from
# the environment; in a Kubernetes StatefulSet set INSTANCE_NAME to the pod name,
# the stable 0-based ordinal (mdm-0, mdm-1, ...).
name: $INSTANCE_NAME

# FlareX root (may be a chain): verifies identity's server cert + device client
# certs, and its self-signed root is embedded as the enrollment trust anchor.
ca: certs/ca.crt

# Shared strong-consistency enrollment cache (bridges the durable store's lag).
redis:
  addr: redis:6379
  password: ""
  db: 0

# NATS JetStream event bus. The stream captures all enrollment subjects; the
# consumer is per-instance (set its name to this instance, see name above).
eventBus:
  enrollments:
    stream:
      name: ENROLLMENTS
      config: |
        {
          "description": "mdm:enrollments",
          "subjects": [
            "enrollments.>"
          ]
        }
    consumer:
      name: $INSTANCE_NAME   # per-instance durable consumer (same as name above)
      stream: ENROLLMENTS
      config: |
        {
          "ack_policy": "explicit"
        }
  # command_responded events. Retained (max_age) so a consumer added later can
  # replay them; no consumer is pulled yet, and the durable is shared (not
  # per-instance) because results are consumed once, not projected per instance.
  # max_age is nanoseconds (jetstream.StreamConfig.MaxAge is a time.Duration):
  # 604800000000000 = 7 days.
  commands:
    stream:
      name: COMMANDS
      config: |
        {
          "description": "mdm:commands",
          "subjects": [
            "commands.>"
          ],
          "max_age": 604800000000000
        }
    consumer:
      name: commands
      stream: COMMANDS
      config: |
        {
          "ack_policy": "explicit"
        }

push:
  cert: certs/push.pem
  key: certs/push-key.pem

identity:
  url: https://10.8.0.1:8443         # identity's mTLS API
  cert: certs/identity/client.crt    # client cert presented to identity
  key: certs/identity/client.key

enroll:
  identifier: io.flarex.mdm.enroll
  organization: FlareX
  externalURL: https://device.mdm.flarex.io   # device-facing mTLS host (-> /server, /checkin); must reach mdm:8443 directly (TCP passthrough), NOT the TLS-terminating admin host
  scep:
    url: https://ca.flarex.io/scep/mdm-scep  # Step-CA SCEP endpoint = <ca>/scep/<provisioner>
    caName: mdm-scep                         # SCEP CA-IDENT (provisioner name)

# Bearer-token auth for the admin endpoints (/enroll, /enqueue), verified against
# identity's JWKS. Omit this block to leave those endpoints unauthenticated.
auth:
  jwksURL: https://identity.flarex.io/.well-known/jwks.json  # public JWKS (system trust)
  issuer: identity.flarex.io                                 # must match the token's iss
  audience: mdm.flarex.io                                    # add this to identity's jwt.audiences
